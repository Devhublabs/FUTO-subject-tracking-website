<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — FUTO Data Collection</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <div class="bg-blob-2"></div>

  <div class="app-wrapper has-sidebar">

    <!-- ── HEADER ───────────────────────────────────────── -->
    <header class="header">
      <div class="header-inner">

        <a class="header-brand" href="dashboard.html">
          <div class="header-logo">📊</div>
          <span class="header-wordmark">FUTO <span>Data</span></span>
        </a>

        <div class="header-actions">
          <div class="avatar avatar-md" id="header-avatar">DO</div>
          <div class="tier-badge silver" id="header-tier">⭐ Tier 1</div>
          <button type="button" class="btn btn-ghost btn-sm btn-icon" id="btn-settings" title="Settings" aria-label="Settings">⚙️</button>
          <button type="button" class="btn btn-ghost btn-sm btn-icon" id="btn-logout" title="Log out" aria-label="Log out">🚪</button>
        </div>

      </div>
    </header>

    <!-- ── MAIN ─────────────────────────────────────────── -->
    <main class="main">
      <div class="container">

        <!-- Page heading -->
        <div class="page-header">
          <h1 class="page-title" id="page-welcome">Welcome back</h1>
          <p class="page-desc" id="page-tier-desc">Loading your profile…</p>
        </div>

        <!-- ── STATS BAR ─────────────────────────────────── -->
        <section>
          <div class="stats-grid">

            <div class="stat-item">
              <span class="stat-label">Daily Quota</span>
              <span class="stat-value primary" id="stat-quota">—</span>
              <span class="stat-sub" id="stat-quota-sub">remaining today</span>
            </div>

            <div class="stat-item">
              <span class="stat-label">Balance</span>
              <span class="stat-value" id="stat-balance">—</span>
              <span class="stat-sub">current balance</span>
            </div>

            <div class="stat-item">
              <span class="stat-label">To Withdraw</span>
              <span class="stat-value warning" id="stat-to-withdraw">—</span>
              <span class="stat-sub">more needed (min &#8358;1,000)</span>
            </div>

          </div>
        </section>

        <!-- ── TEXTBOOK CARDS ────────────────────────────── -->
        <section>
          <div class="books-grid" id="books-grid">

          </div>
        </section>

        <!-- ── TIER PROGRESSION ──────────────────────────── -->
        <section>
          <div class="card" id="tier-panel">
            <div class="card-header">
              <div>
                <div class="card-title">Tier Progression</div>
                <div class="card-subtitle">Your current tier and next milestone</div>
              </div>
              <button class="btn btn-ghost btn-sm" id="tier-toggle">Hide</button>
            </div>

            <div id="tier-content">
              <div class="tier-badge silver" id="tier-badge">⭐ Tier 1 — Newcomer</div>

              <div class="stack" style="margin-top: 16px;">
                <div class="progress-wrap">
                  <div class="progress-header">
                    <span class="progress-label" id="tier-progress-label">Progress to Tier 2</span>
                    <span class="progress-value" id="tier-progress-value">&#8358;0 / &#8358;1,000</span>
                  </div>
                  <div class="progress-track">
                    <div class="progress-fill" id="tier-progress-fill" style="width: 0%;"></div>
                  </div>
                </div>
                <p class="text-muted" style="font-size: var(--text-sm);" id="tier-progress-desc">
                  Loading tier info…
                </p>
              </div>
            </div>
          </div>
        </section>

      </div>
    </main>

  </div>

  <!-- FAB -->
  <button class="fab" id="fab-upload" title="Upload Image" type="button">+</button>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts — always in this order -->
  <script src="../js/routes.js"></script>
  <script src="../js/state.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
